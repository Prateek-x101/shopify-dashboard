openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Shopify Orders Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Shopify order operations
  - name: settings
    description: Settings operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List Shopify orders
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: page_info
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: financial_status
          in: query
          schema:
            type: ["string", "null"]
        - name: fulfillment_status
          in: query
          schema:
            type: ["string", "null"]
        - name: query
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single Shopify order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

  /orders/{id}/events:
    get:
      operationId: getOrderEvents
      tags: [orders]
      summary: Get Shopify events (timeline) for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderEventsResponse"

  /orders/summary:
    get:
      operationId: getOrdersSummary
      tags: [orders]
      summary: Get orders summary stats for today
      responses:
        "200":
          description: Orders summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersSummary"

  /whatsapp/status:
    get:
      operationId: getWhatsappStatus
      tags: [whatsapp]
      summary: Get WhatsApp connection status and QR code
      responses:
        "200":
          description: WhatsApp status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppStatus"

  /whatsapp/connect:
    post:
      operationId: connectWhatsapp
      tags: [whatsapp]
      summary: Initialize WhatsApp Web connection (generates QR)
      responses:
        "200":
          description: Connection initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppStatus"

  /whatsapp/disconnect:
    post:
      operationId: disconnectWhatsapp
      tags: [whatsapp]
      summary: Disconnect WhatsApp Web session
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppStatus"

  /whatsapp/rules:
    get:
      operationId: listWhatsappRules
      tags: [whatsapp]
      summary: List all automation rules
      responses:
        "200":
          description: Rules list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppRulesResponse"
    post:
      operationId: createWhatsappRule
      tags: [whatsapp]
      summary: Create a new automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWhatsAppRuleBody"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppRule"

  /whatsapp/rules/{id}:
    delete:
      operationId: deleteWhatsappRule
      tags: [whatsapp]
      summary: Delete a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
    patch:
      operationId: toggleWhatsappRule
      tags: [whatsapp]
      summary: Toggle rule enabled/disabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleRuleBody"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppRule"

  /whatsapp/shopify-statuses:
    get:
      operationId: getShopifyStatuses
      tags: [whatsapp]
      summary: Get all Shopify trigger statuses
      responses:
        "200":
          description: Shopify statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopifyStatusesResponse"

  /whatsapp/send-message:
    post:
      operationId: sendWhatsappMessage
      tags: [whatsapp]
      summary: Send a real WhatsApp message to a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendWhatsAppMessageBody"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppMessage"
        "400":
          description: Bad request
        "503":
          description: WhatsApp not connected

  /whatsapp/messages/{order_id}:
    get:
      operationId: getWhatsappMessages
      tags: [whatsapp]
      summary: Get WhatsApp chat history for an order
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppMessagesResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OrderAddress:
      type: object
      properties:
        first_name:
          type: ["string", "null"]
        last_name:
          type: ["string", "null"]
        address1:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        province:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        zip:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        name:
          type: ["string", "null"]

    LineItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        quantity:
          type: integer
        price:
          type: string
        variant_title:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        fulfillment_status:
          type: ["string", "null"]
        image_url:
          type: ["string", "null"]
      required:
        - id
        - title
        - quantity
        - price

    Customer:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: ["string", "null"]
        last_name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        orders_count:
          type: integer
      required:
        - id

    Order:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        financial_status:
          type: ["string", "null"]
        fulfillment_status:
          type: ["string", "null"]
        total_price:
          type: string
        subtotal_price:
          type: string
        total_discounts:
          type: string
        total_shipping_price:
          type: string
        currency:
          type: string
        customer:
          $ref: "#/components/schemas/Customer"
        shipping_address:
          $ref: "#/components/schemas/OrderAddress"
        billing_address:
          $ref: "#/components/schemas/OrderAddress"
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
        channel:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        tags:
          type: string
        payment_gateway:
          type: ["string", "null"]
      required:
        - id
        - name
        - created_at
        - total_price
        - currency
        - line_items

    OrderListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        page_info:
          type: object
          properties:
            has_next_page:
              type: boolean
            has_previous_page:
              type: boolean
            next_cursor:
              type: ["string", "null"]
            previous_cursor:
              type: ["string", "null"]
      required:
        - orders

    OrdersSummary:
      type: object
      properties:
        total_orders_today:
          type: integer
        total_orders_change_pct:
          type: number
        items_ordered_today:
          type: integer
        items_change_pct:
          type: number
        returns_today:
          type: integer
        orders_fulfilled_today:
          type: integer
        orders_delivered_today:
          type: integer
      required:
        - total_orders_today
        - items_ordered_today
        - returns_today
        - orders_fulfilled_today
        - orders_delivered_today

    OrderEvent:
      type: object
      properties:
        id:
          type: integer
        subject_type:
          type: string
        subject_id:
          type: integer
        verb:
          type: string
        body:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        author:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        created_at:
          type: string
        arguments:
          type: array
          items:
            type: string
      required:
        - id
        - verb
        - created_at

    OrderEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/OrderEvent"
      required:
        - events

    ToggleRuleBody:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled

    WhatsAppStatus:
      type: object
      properties:
        connected:
          type: boolean
        phone_number:
          type: ["string", "null"]
        qr_data_url:
          type: ["string", "null"]
        state:
          type: string
      required:
        - connected
        - state

    WhatsAppButton:
      type: object
      properties:
        id:
          type: string
        body:
          type: string
      required:
        - body

    WhatsAppRule:
      type: object
      properties:
        id:
          type: string
        trigger_type:
          type: string
        trigger_status:
          type: string
        trigger_label:
          type: string
        message_template:
          type: string
        enabled:
          type: boolean
        send_image:
          type: boolean
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/WhatsAppButton"
        footer:
          type: ["string", "null"]
        created_at:
          type: string
      required:
        - id
        - trigger_type
        - trigger_status
        - trigger_label
        - message_template
        - enabled
        - send_image
        - buttons
        - created_at

    CreateWhatsAppRuleBody:
      type: object
      properties:
        trigger_type:
          type: string
        trigger_status:
          type: string
        message_template:
          type: string
        send_image:
          type: boolean
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/WhatsAppButton"
        footer:
          type: ["string", "null"]
      required:
        - trigger_type
        - trigger_status
        - message_template
        - send_image
        - buttons

    WhatsAppRulesResponse:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/WhatsAppRule"
      required:
        - rules

    SendWhatsAppMessageBody:
      type: object
      properties:
        to_phone:
          type: string
        message:
          type: string
        order_id:
          type: string
        order_name:
          type: string
        customer_name:
          type: string
      required:
        - to_phone
        - message
        - order_id

    WhatsAppMessage:
      type: object
      properties:
        id:
          type: string
        order_id:
          type: string
        to_phone:
          type: string
        message:
          type: string
        from:
          type: string
        status:
          type: string
        timestamp:
          type: string
      required:
        - id
        - order_id
        - to_phone
        - message
        - from
        - status
        - timestamp

    WhatsAppMessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/WhatsAppMessage"
        connected:
          type: boolean
        phone_number:
          type: ["string", "null"]
      required:
        - messages
        - connected

    ShopifyStatus:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        type:
          type: string
        description:
          type: string
        emoji:
          type: string
      required:
        - id
        - label
        - type
        - description
        - emoji

    ShopifyStatusesResponse:
      type: object
      properties:
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/ShopifyStatus"
      required:
        - statuses

    Settings:
      type: object
      properties:
        store_url:
          type: string
        api_configured:
          type: boolean
        store_name:
          type: ["string", "null"]
      required:
        - store_url
        - api_configured

    SettingsInput:
      type: object
      properties:
        store_url:
          type: string
      required:
        - store_url
